# Local development database for LayoutLab.
# Production uses Vercel Postgres (Neon); this is a plain Postgres for `npm run dev`,
# `db:migrate`, and `db:seed` locally. db/client.ts auto-selects the node-postgres
# driver when POSTGRES_URL points at localhost.
#
#   docker compose up -d        # start
#   docker compose down         # stop (keeps data)
#   docker compose down -v      # stop + wipe data
services:
  db:
    image: postgres:16-alpine
    container_name: layoutlab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: layoutlab
      POSTGRES_PASSWORD: layoutlab
      POSTGRES_DB: layoutlab
    ports:
      - '5433:5432'
    volumes:
      - layoutlab-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U layoutlab -d layoutlab']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  layoutlab-pgdata:
